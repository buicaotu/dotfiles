# terminal & colors
set -g default-terminal "screen-256color"
set -ag terminal-overrides ',xterm-256color:RGB'

# -- navigation -----------------------------------------------------------------
# ---------------------------------------------------------------------------------
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind -r n next-window           # flipping through windows
bind -r p previous-window
bind -r Tab select-pane -t :.+  # cycling panes
# ---------------------------------------------------------------------------------


# general
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g history-limit 10000
set -g mouse on
set -g set-clipboard on
set -g focus-events on
set -w -g mode-keys vi
set -g status-keys vi

# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi H send -X start-of-line
bind-key -T copy-mode-vi L send -X end-of-line

# -- resize -----------------------------------------------------------------
bind-key -r -T prefix K resize-pane -U 5
bind-key -r -T prefix J resize-pane -D 5
bind-key -r -T prefix H resize-pane -L 5
bind-key -r -T prefix L resize-pane -R 5

# -- status bar (vscode dark theme) -------------------------------------------

set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#252526,fg=#d4d4d4'

# left: session name
set -g status-left-length 30
set -g status-left '#[bg=#007acc,fg=#ffffff,bold] #S #[default]#{?client_prefix, #[fg=#dcdcaa]PREFIX,}#{?window_zoomed_flag, #[fg=#6a9955]ZOOM,} '

# right: date & time
set -g status-right-length 50
set -g status-right '#[fg=#858585]%Y-%m-%d #[fg=#d4d4d4]%H:%M '

# window tabs
set -g window-status-format '#[fg=#858585] #I:#W '
set -g window-status-current-format '#[bg=#1e1e1e,fg=#d4d4d4,bold] #I:#W '
set -g window-status-separator ''

# pane borders
set -g pane-border-style 'fg=#474747'
set -g pane-active-border-style 'fg=#007acc'

# message & command bar
set -g message-style 'bg=#252526,fg=#d4d4d4'
set -g message-command-style 'bg=#252526,fg=#d4d4d4'
